#:schema https://mise.jdx.dev/schema/mise.json

[tool_alias]
ranger = "pipx:ranger-fm"
ratarmount = "github:mxmlnkn/ratarmount"
tldr = "github:tealdeer-rs/tealdeer"

[tools]
fd = "latest"
fzf = "latest"
jj = "latest"
jjui = "latest"
lazygit = "latest"
neovim = "latest"
node = "latest"
tree-sitter = "latest"
usage = "latest"
uv = "latest"
zoxide = "latest"
"pipx:dotdrop" = "latest"
"pipx:ipython" = "latest"
"pipx:pynvim" = "latest"

[tools.bat]
version = "latest"
postinstall = "bat --completion zsh > ~/.zsh-complete/_bat"

[tools.delta]
version = "latest"
postinstall = "delta --generate-completion zsh > ~/.zsh-complete/_delta"

[tools.eza]
version = "latest"
postinstall = """
mkdir -p ~/.config/eza
ln -sf \
    ~/.cache/antidote/catppuccin/eza/themes/mocha/catppuccin-mocha-lavender.yml \
    ~/.config/eza/theme.yml
"""

[tools.ranger]
version = "latest"

# Running v1.9.4 with Python 3.14 causes SyntaxWarning messages to be printed
uvx_args = "--no-managed-python"

postinstall = """
mkdir -p ~/.config/ranger/plugins
ln -sf ~/.cache/antidote/jchook/ranger-zoxide ~/.config/ranger/plugins/zoxide
"""

[tools.ratarmount]
version = "latest"
bin = "ratarmount"
asset_pattern = "*{{ version }}-x86*" # Don't use slim

[tools.ripgrep]
version = "latest"
postinstall = "rg --generate complete-zsh > ~/.zsh-complete/_rg"

[tools.tldr]
version = "latest"
bin = "tldr"
postinstall = """
ln -sf ~/.cache/antidote/tealdeer-rs/tealdeer/completion/zsh_tealdeer \
    ~/.zsh-complete/_tldr
"""
